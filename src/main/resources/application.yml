spring:
  application:
    name: GenWriter
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
      - org.springframework.ai.autoconfigure.anthropic.AnthropicAutoConfiguration
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  ai:
    dashscope:
      api-key: sk-63eddc9cd84341debf5b63a04c5f3cbe
      chat:
        enabled: true
        options:
          model: qwen-plus
          temperature: 0.7
      embedding:
        enabled: true
        options:
          model: text-embedding-v4
    vectorstore:
      pgvector:
        index-type: hnsw
        distance-type: cosine_distance
        dimensions: 1024
        initialize-schema: false
  # sql:
  #   init:
  #     mode: always
  #     schema-locations: classpath:db/schema.sql
  datasource:
    url: jdbc:postgresql://localhost:5432/genwriter_db
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

mybatis-plus:
  type-aliases-package: com.example.genwriter.model.entity
  type-handlers-package: com.example.genwriter.typehandler
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler
    cache-enabled: true
    lazy-loading-enabled: true

logging:
  level:
    root: INFO
    com.example.genwriter: INFO
    org.springframework.jdbc: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/genwriter.log

app:
  embedding:
    default-model: text-embedding-v4
    dimensions:
      text-embedding-v4: 1024
      openai-ada-002: 1536
      openai-small: 1536
      openai-large-3: 3072
  writing:
    default-style: formal
    supported-styles:
      - formal
      - casual
      - academic
      - creative
      - business
      - technical
    default-format: markdown
    max-context-messages: 20
  knowledge:
    default-search-limit: 5
    similarity-threshold: 0.7
    max-chunk-size: 1000
    chunk-overlap: 100
  upload:
    path: uploads

genwriter:
  llm:
    default-provider: dashscope
    default-model: qwen-plus
    default-temperature: 0.7
    default-max-tokens: 65535
    providers:
      - type: dashscope
        display-name: 通义千问
        api-key: sk-63eddc9cd84341debf5b63a04c5f3cbe
        models:
          - qwen-plus
          - qwen-max
          - qwen-turbo
        active-model: qwen-plus
      - type: deepseek
        display-name: DeepSeek
        api-key: your-deepseek-key
        base-url: https://api.deepseek.com
        api-compatibility: openai_compatible
        reasoning: true
        models:
          - deepseek-chat
          - deepseek-reasoner
        active-model: deepseek-chat
      - type: moonshot
        display-name: Kimi
        api-key: your-moonshot-key
        base-url: https://api.moonshot.cn
        api-compatibility: openai_compatible
        models:
          - moonshot-v1-8k
          - moonshot-v1-32k
          - moonshot-v1-128k
        active-model: moonshot-v1-8k
      - type: zhipu
        display-name: 智谱GLM
        api-key: your-zhipu-key
        base-url: https://open.bigmodel.cn/api/paas/v4
        api-compatibility: openai_compatible
        models:
          - glm-4
          - glm-4-flash
          - glm-4v
        active-model: glm-4
  embedding:
    default-model: text-embedding-v4
    dimension: 1024
    batch-size: 100
    default-search-limit: 5
    similarity-threshold: 0.7
    use-db-vector-search: true
  memory:
    key-prefix: "genwriter:chat:memory:"
    ttl-hours: 24
    window-size: 20
    max-messages: 50
  graph:
    enabled: false
    checkpoint:
      enabled: true
      key-prefix: "genwriter:graph:checkpoint:"
      ttl-hours: 24
  supervisor:
    enabled: true
    max-iterations: 12
    max-replan-count: 2
    temperature: 0.2
    max-history-items: 20
    fallback-worker: direct_answer
  researcher:
    max-search-queries: 5
    max-search-results-per-query: 10
    enabled: true
  websearch:
    api-key: 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
    timeout-seconds: 30
  long-term-memory:
    enabled: true
    retrieval:
      max-results: 5
      similarity-threshold: 0.65
      dedup-threshold: 0.85
    extraction:
      enabled: true
      async: true
      max-memories-per-turn: 5
      temperature: 0.1
    article-query-extraction:
      enabled: true
      max-queries: 5
      min-article-length: 500
      temperature: 0.1
    writing-skill-extraction:
      enabled: true
      async: true
      max-skills-per-turn: 3
      temperature: 0.2
  skills:
    external-dir: ""
  prompts:
    writing-system-prompt: |
      你是一位专业的写作助手，擅长根据用户的需求提供高质量的写作建议和内容生成。
      请根据用户的输入，提供有帮助、准确且富有创意的回复。
    document-continuation-prompt: |
      请根据以下文档内容继续写作，保持原有风格和语气：
      已有内容：
      {content}
      请继续：
    document-polish-prompt: |
      请对以下文档进行润色优化，提升表达质量，保持原意不变：
      原文：
      {content}
      润色后：
    knowledge-qa-prompt: |
      基于以下知识库内容回答问题：
      知识库内容：
      {context}
      用户问题：{question}
      请根据知识库内容提供准确、简洁的回答。如果知识库中没有相关信息，请明确说明。
    writing-skill-extraction-prompt: |
      你是一位写作技巧提取专家。分析以下用户与写作助手的交互，判断用户是否表达了可抽象为通用写作技巧的改进要求。

      # 提取标准
      只提取满足以下条件的技巧：
      1. 用户明确指出了写作中的问题或改进方向
      2. 该要求可抽象为一条可复用的写作规则（不限于本次内容）
      3. 不是针对特定事实内容的修改（如"把主角名字改成张三"不提取）

      # 输出格式
      纯 JSON 数组，不要 markdown 代码块：
      [{
        "skillName": "技巧名称",
        "category": "描写|叙事|对话|结构|修辞|风格|其他",
        "rule": "具体规则描述",
        "applicableScene": "适用场景",
        "goodExample": "正例（如有）",
        "badExample": "反例（如有）",
        "importance": "HIGH|MEDIUM|LOW"
      }]

      # 交互内容
      用户输入：{userInput}
      助手输出：{assistantOutput}
      写作类型：{writingType}

      若无可提取技巧，返回空数组 []。
    article-skill-learning-prompt: |
      你是一位写作技法分析专家。请从用户提供的示例文章中，提取可复用的写作技巧、风格特征和表达手法。

      # 分析维度
      - 叙事节奏：张弛、快慢、悬念设置
      - 修辞手法：比喻、排比、通感、反讽等
      - 段落结构：长短交替、段落功能划分
      - 对话风格：口语化程度、潜台词、对话推动剧情的方式
      - 过渡技巧：场景切换、时间跳跃的处理
      - 视角控制：人称、距离、聚焦方式
      - 描写策略：感官运用、细节选择、动静结合
      - 语言质感：词汇偏好、句式节奏、语气特征

      # 输出格式
      纯 JSON 数组，不要 markdown 代码块：
      [{
        "skillName": "技巧名称",
        "category": "描写|叙事|对话|结构|修辞|风格|节奏|视角|其他",
        "rule": "具体规则描述，说明该技法是什么以及如何使用",
        "applicableScene": "适用场景",
        "goodExample": "从文章中截取的正例原文片段",
        "importance": "HIGH|MEDIUM|LOW"
      }]

      # 用户说明
      {description}

      # 示例文章
      {articleContent}

      如果文章没有明显的可提取技法，返回空数组 []。

server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-response: true
      force-request: true
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
