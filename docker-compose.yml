services:
  # ======================
  # PostgreSQL + pgvector
  # ======================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: genwriter-db
    environment:
      POSTGRES_DB: genwriter_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ======================
  # Redis
  # ======================
  redis:
    image: redis:7-alpine
    container_name: genwriter-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ======================
  # 后端 (Spring Boot)
  # ======================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: genwriter-backend
    environment:
      # 数据库配置
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/genwriter_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-123456}
      # Redis 配置
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # AI API Key（客户需要配置）
      SPRING_AI_DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-sk-63eddc9cd84341debf5b63a04c5f3cbe}
      # 联网搜索 API Key（可选）
      GENWRITER_WEBSEARCH_API_KEY: ${TAVILY_API_KEY:-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}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ======================
  # 前端 (Nginx)
  # ======================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: genwriter-web
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres-data:
